  <title>Audio</title>
    <style>
    img {
      width: 50%;
      height: auto;
    }
    .container {
      display: grid;
      grid-template-areas:
        "header header"
        "menu content"
        "footer footer";
      grid-template-columns: 0.6fr 3fr;
      gap: 5px;
      background-color: #304D82;
      padding: 0%;
      margin: auto;
    }

    .container>div {
      background-color: rgba(247, 247, 247, 0.8);
      padding: 1%;
      margin: auto
    }

    .container>div.header {
      grid-area: header;
      text-align: center;
      margin: auto;
      text-shadow: 2px 2px 5px rgb(255, 255, 255);
      font-family:'Times New Roman', Times, serif;
      font-style: italic;
      margin: 10px 50px 10px 200px;
    }

    .container>div.menu {
      display:inline;
      grid-area: menu;
      height: 1100px;
      width: 160px;
      position: absolute;
      left: 0px;
      padding: 6px;
      background-color: #001C4F;
      text-align: center;
      
    }

    .container>div.content {
      grid-area: content;
      justify-content: left;
      height: 100%;
      text-shadow: 2px 2px 5px rgb(255, 255, 255);
      font-family:'Times New Roman', Times, serif;
      font-weight:bolder;
      margin: auto;
    }

    .container>div.footer {
      grid-area: footer;
    }

    .button {
      background-color: #001C4F;
      border: none;
      color: white;
      padding: 15px 32px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 16px;
      margin: auto;
      cursor: pointer;
      width: 100%
    }

    .button:hover {
      background-color: #64a4f8;
    }
  
    /*added content*/
    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Lucida Sans", sans-serif;
      font-size: 17px;
    }

    .header {
      grid-area: header;
      background-color: purple;
      text-align: center;
      color: #000000;
    }

    .header>h1 {
      font-size: 40px;
    }

    ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  width: 130px;
  background-color: #1e037c;
  position: fixed;
  height: 100%;
  overflow: auto;
}

li a {
  display: block;
  color: rgb(255, 255, 255);
  padding: 8px 16px;
  text-decoration: none;
  border-bottom: 1px solid #ffffff;
}

li a.active {
  background-color: #4206ce;
  color: white;
  border-bottom: 1px solid #ffffff;
}

li:last-child {
  border-bottom: none;
}

li a:hover:not(.active) {
  background-color: #09729b;
  color: white;
}
  </style>
