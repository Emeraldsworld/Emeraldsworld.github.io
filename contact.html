<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emerald's portfolio</title>
    <style>
    img {
      width: 50%;
      height: auto;
    }
    .container {
      display: grid;
      grid-template-areas:
        "header header"
        "menu content"
        "footer footer";
      grid-template-columns: 0.6fr 3fr;
      gap: 5px;
      background-color: #304D82;
      padding: 0%;
      margin: auto;
    }

    .container>div {
      background-color: rgba(247, 247, 247, 0.8);
      padding: 1%;
      margin: auto
    }

    .container>div.header {
      grid-area: header;
      text-align: center;
      margin: auto;
      text-shadow: 2px 2px 5px rgb(255, 255, 255);
      font-family:'Times New Roman', Times, serif;
      margin: 10px 50px 10px 200px;
      border-style: solid;
      border-width: 5px;
      border-color:#09729b;
      border-radius: 20%;
    }

    .container>div.content {
      grid-area: content;
      justify-content: left;
      height: 100%;
      text-shadow: 2px 2px 5px rgb(255, 255, 255);
      font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
      border-style: solid;
      border-width: 5px;
      border-color:#09729b;
      border-radius: 5%;
    }

    .container>div.footer {
      grid-area: footer;
    }
    /*added content*/
    * {
      box-sizing: border-box;
    }

    body {
      font-size: 17px;
    }

    .header {
      grid-area: header;
      background-color: purple;
      text-align: center;
      color: #000000;
    }

    .header>h1 {
      font-size: 40px;
    }

    ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  width: 130px;
  background-color: #ffffff;
  position: fixed;
  height: 100%;
  overflow: auto;
  border-style: solid;
  border-width: 5px;
  border-color:#09729b;
  border-radius: 1%;
}

li a {
  display: block;
  color: rgb(0, 0, 0);
  padding: 8px 16px;
  text-decoration: none;
  border-bottom: 1px solid #ffffff;
   border-style: solid;
  border-width: 2px;
  border-color:#09729b;
  border-radius: 1%;
}

li a.active {
  background-color: #88a4a7;
  color: white;
  border-bottom: 1px solid #ffffff;
   border-style: solid;
  border-width: 1px;
  border-color:#09729b;
  border-radius: 1%;
}

li:last-child {
  border-bottom: none;
}
li a:hover:not(.active) {
  background-color: #09729b;
  color: white;
}
  </style>
</head>
